version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rwa_marketplace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - '5432:5432'

  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/rwa_marketplace
    ports:
      - '4000:4000'
    depends_on:
      - db

  frontend:
    build: ./frontend
    env_file: .env
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  pgdata:
